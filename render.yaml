databases:
  - name: ddbms-db
    databaseName: ddbms
    user: ddbms
    plan: free

services:
  - type: web
    name: ddbms-backend
    env: node
    plan: free
    buildCommand: "cd backend && npm install && npx prisma generate && npx prisma db push --accept-data-loss && npm run build"
    startCommand: "cd backend && npm run start:prod"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ddbms-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000

  - type: web
    name: ddbms-frontend
    env: node
    plan: free
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npm start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: ddbms-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: PORT
        value: 10000
